    <style>
        :root {
            --bg-body: #07070A;
            --bg-card: #121216;
            --primary: #F59E0B;
            --text-dark: #FFFFFF;
            --text-gray: #A1A1AA;
            --border-light: rgba(248, 209, 116, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        .thank-card {
            background: var(--bg-card);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid var(--border-light);
            box-shadow: 0 25px 50px rgba(245, 158, 11, 0.1);
        }

        .thank-card i.success-icon {
            font-size: 70px;
            color: var(--primary);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.4));
        }

        .thank-card h1 {
            font-size: 30px;
            font-weight: 900;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .thank-card .lead {
            color: var(--text-dark);
            font-size: 16px;
            margin-bottom: 25px;
            line-height: 1.5;
            font-weight: 500;
        }

        .thank-card .hint {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #2AABEE;
            color: white;
            padding: 18px;
            border-radius: 12px;
            font-weight: 800;
            text-decoration: none;
            margin-top: 25px;
            transition: 0.3s;
            font-size: 16px;
        }

        .tg-btn:hover {
            background: #229ED9;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(42, 171, 238, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 28px;
            color: #52525B;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text-gray);
        }
    </style>
</head>

<body>
    <noscript><img height="1" width="1" style="display:none"

    <main class="thank-card">
        <i class="ph-fill ph-check-circle success-icon" aria-hidden="true"></i>
        <h1>Tabriklaymiz!</h1>
        <p class="lead">Siz ro’yxatdan o’tdingiz. Yaqin daqiqa ichida siz bilan bog’lanamiz.</p>
        <p class="hint">Agar hoziroq biz bilan bog’lanmoqchi bo’lsangiz, pastdagi TELEGRAM tugmasini bosib, bizga telegram
            orqali yozing.</p>
        <a href="https://t.me/umarali_ua" target="_blank" rel="noopener noreferrer" class="tg-btn">
            <i class="ph-fill ph-telegram-logo" style="font-size:26px;"></i> Telegram: t.me/umarali_ua
        </a>
        <a href="index.html" class="back-link">Bosh sahifaga qaytish</a>
    </main>
</body>

</html>
